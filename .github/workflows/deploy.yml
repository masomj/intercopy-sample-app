name: Deploy Sample App to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── 1. Fetch locales from InterCopy ────────────────────────────
  fetch-locales:
    runs-on: ubuntu-latest
    outputs:
      locales-changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch locale files from InterCopy
        env:
          INTERCOPY_PROJECT_ID: ${{ secrets.INTERCOPY_PROJECT_ID }}
          INTERCOPY_API_TOKEN: ${{ secrets.CLSAAS_API_TOKEN }}
          INTERCOPY_API_URL: https://api.intercopy.co.uk
        run: |
          mkdir -p src/locales

          if [ -z "$INTERCOPY_PROJECT_ID" ] || [ -z "$INTERCOPY_API_TOKEN" ]; then
            echo "⚠️  INTERCOPY_PROJECT_ID or CLSAAS_API_TOKEN not set — using bundled locales"
            ls -la src/locales/
            exit 0
          fi

          echo "Fetching locales for project: $INTERCOPY_PROJECT_ID"

          HTTP_STATUS=$(curl -sS -o /tmp/intercopy-export.json -w "%{http_code}" \
            -H "X-Api-Token: $INTERCOPY_API_TOKEN" \
            -H "Accept: application/json" \
            "$INTERCOPY_API_URL/api/integration/exports/locales?projectId=$INTERCOPY_PROJECT_ID&version=live" || echo "000")

          if [ "$HTTP_STATUS" = "200" ] && jq -e '.source' /tmp/intercopy-export.json > /dev/null 2>&1; then
            echo "✅ Export fetched — splitting into locale files"

            # Each language key in the response → src/locales/<lang>.json
            # Skip the duplicate "source" alias (we get the real BCP-47 code too)
            for lang in $(jq -r 'keys[] | select(. != "source")' /tmp/intercopy-export.json); do
              jq --arg lang "$lang" '.[$lang]' /tmp/intercopy-export.json > "src/locales/${lang}.json"
              echo "  Written src/locales/${lang}.json"
            done
          else
            echo "⚠️  InterCopy API returned $HTTP_STATUS — using bundled locales"
            echo "Response body (first 500 chars):"
            head -c 500 /tmp/intercopy-export.json || true
            echo
          fi

          echo "Locale files present:"
          ls -la src/locales/

      - name: Check if locales changed
        id: diff
        run: |
          if git diff --quiet src/locales/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload locale artifacts
        uses: actions/upload-artifact@v4
        with:
          name: locales
          path: src/locales/

  # ── 2. Build ───────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: fetch-locales
    steps:
      - uses: actions/checkout@v4

      - name: Download fresh locales
        uses: actions/download-artifact@v4
        with:
          name: locales
          path: src/locales/

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: /intercopy-sample-app/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ── 3. Deploy ──────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
